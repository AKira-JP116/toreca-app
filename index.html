<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ収支 自動入力</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--y:#f5c518;--g:#00c896;--p:#a78bfa;--text:#f0f0f0;--muted:#777;--danger:#ff4d4d;--r:12px;--accent:#f5c518;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--y);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:14px;font-weight:900;}
.logo-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.hbtn{background:var(--g);color:#000;border:none;border-radius:8px;padding:8px 16px;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;}
.hbtn:hover{opacity:.85;}.hbtn:disabled{opacity:.35;cursor:default;}
main{padding:24px;max-width:820px;margin:0 auto;}
.mode-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.mtab{flex:1;padding:13px 0;background:var(--surface);color:var(--muted);font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;}
.mtab:not(:last-child){border-right:1px solid var(--border);}
.mtab.act-buy{background:rgba(245,197,24,.1);color:var(--y);}
.mtab.act-sell{background:rgba(0,200,150,.1);color:var(--g);}
.platform-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.pchip{padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Zen Kaku Gothic New',sans-serif;}
.pchip:hover{border-color:var(--accent);color:var(--accent);}
.pchip.sel{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,.05);}
.method-row{display:flex;gap:8px;margin-bottom:18px;}
.mbtn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.mbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,.04);}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;background:var(--surface);margin-bottom:16px;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--surface2);}
.upload-zone .uicon{font-size:36px;margin-bottom:10px;}
.upload-zone h3{font-size:15px;font-weight:700;margin-bottom:5px;}
.upload-zone p{font-size:12px;color:var(--muted);}
.upload-zone input{display:none;}
.cam-btns{display:flex;gap:10px;margin-bottom:16px;}
.cam-btn{flex:1;padding:16px 10px;border:none;border-radius:var(--r);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:900;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.cam-btn .cicon{font-size:28px;}
.cam-btn .clabel{font-size:12px;opacity:.8;}
.cam-btn.cam{background:var(--accent);color:#000;}
.cam-btn.gal{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);}
.cam-btn.gal:hover{border-color:var(--accent);color:var(--accent);}
.cam-btn:active{transform:scale(.97);}
.preview-wrap{position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:16px;display:none;}
.preview-wrap.show{display:block;}
.preview-wrap img{width:100%;max-height:240px;object-fit:contain;background:#111;display:block;}
.prev-rm{position:absolute;top:8px;right:8px;width:26px;height:26px;background:rgba(0,0,0,.75);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.ai-btn{width:100%;padding:13px;border:none;border-radius:var(--r);font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;}
.ai-btn:disabled{opacity:.35;cursor:default;}
.ai-btn.buy{background:var(--y);color:#000;}
.ai-btn.sell{background:var(--g);color:#000;}
.spinner{width:17px;height:17px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;display:none;animation:fadeUp .25s ease;}
.form-panel.show{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-label{font-size:12px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;}
.plat-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.pb-buy{background:rgba(245,197,24,.15);color:var(--y);}
.pb-sell{background:rgba(0,200,150,.15);color:var(--g);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fi{display:flex;flex-direction:column;gap:4px;}
.fi.full{grid-column:1/-1;}
.fi label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;}
.fi-inner{display:flex;gap:6px;align-items:center;}
.fi input,.fi select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 11px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;outline:none;transition:border-color .15s;min-width:0;}
.fi input:focus,.fi select:focus{border-color:var(--accent);}
.fi select option{background:#222;}
/* shop combo */
.shop-wrap{position:relative;flex:1;min-width:0;}
.shop-wrap input{width:100%;}
.shop-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;z-index:50;overflow:hidden;display:none;max-height:180px;overflow-y:auto;}
.shop-dropdown.open{display:block;}
.shop-opt{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.shop-opt:hover{background:var(--surface);}
.shop-opt-name{flex:1;}
.shop-opt-del{font-size:11px;color:var(--muted);padding:2px 5px;border-radius:4px;border:none;background:transparent;cursor:pointer;flex-shrink:0;}
.shop-opt-del:hover{color:var(--danger);}
.shop-new-badge{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;}
.skip-btn{flex-shrink:0;padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap;font-family:'DM Mono',monospace;transition:all .15s;}
.skip-btn:hover{border-color:var(--muted);color:var(--text);}
.skip-btn.skipped{background:rgba(255,255,255,.04);}
.default-badge{font-size:10px;background:rgba(245,197,24,.12);color:var(--y);padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace;}
.auto-hint{font-size:10px;color:#555;font-family:'DM Mono',monospace;margin-top:2px;}
.add-btn{width:100%;padding:11px;border-radius:var(--r);font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .15s;}
.add-btn.buy{border:1.5px solid var(--y);background:transparent;color:var(--y);}
.add-btn.buy:hover{background:rgba(245,197,24,.08);}
.add-btn.sell{border:1.5px solid var(--g);background:transparent;color:var(--g);}
.add-btn.sell:hover{background:rgba(0,200,150,.08);}
.error-msg{background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:#ff8888;margin-bottom:12px;display:none;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.rec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rec-title{font-size:14px;font-weight:900;}
.rec-cnt{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.rec-filters{display:flex;gap:6px;margin-bottom:12px;}
.rfil{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s;}
.rfil.on{border-color:var(--accent);color:var(--accent);}
.rec-list{display:flex;flex-direction:column;gap:5px;}
.rec-item{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 13px;gap:10px;animation:fadeUp .2s;}
.rtype{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.rtype.buy{background:rgba(245,197,24,.12);}
.rtype.sell{background:rgba(0,200,150,.12);}
.rname{flex:1;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rplat{font-size:11px;color:var(--muted);white-space:nowrap;}
.ramnt{font-family:'DM Mono',monospace;font-size:13px;white-space:nowrap;}
.ramnt.buy{color:var(--y);}.ramnt.sell{color:var(--g);}
.rdate{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.rdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;flex-shrink:0;}
.rdel:hover{color:var(--danger);}
.empty{text-align:center;padding:36px 0;color:var(--muted);font-size:13px;}
.empty-big{font-size:30px;margin-bottom:8px;}
.summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:none;}
.summary-bar.show{display:flex;gap:24px;flex-wrap:wrap;}
.sitem{display:flex;flex-direction:column;gap:2px;}
.slabel{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.sval{font-size:16px;font-weight:900;font-family:'DM Mono',monospace;}
.sval.buy{color:var(--y);}.sval.sell{color:var(--g);}.sval.profit{color:#a78bfa;}
@media(max-width:520px){.fgrid{grid-template-columns:1fr;}main{padding:14px;}header{padding:12px 14px;}.summary-bar.show{gap:14px;}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🃏</div>
    <div><div class="logo-text">トレカ収支 AI入力</div><div class="logo-sub">photo → data → xlsx</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="syncBadge" style="font-size:11px;font-family:'DM Mono',monospace;color:#555;display:none;"></span>
    <button class="hbtn" id="exportBtn" disabled onclick="exportExcel()">⬇ Excel出力</button>
  </div>
</header>
<main>
  <div class="mode-tabs">
    <button class="mtab act-buy" id="mtBuy" onclick="setMode('buy')">🃏 仕入れ記録</button>
    <button class="mtab" id="mtSell" onclick="setMode('sell')">💴 販売記録</button>
  </div>
  <div class="platform-row" id="platformRow"></div>
  <div class="method-row">
    <button class="mbtn active" id="mPhoto" onclick="setMethod('photo')">📷 写真から自動入力</button>
    <button class="mbtn" id="mManual" onclick="setMethod('manual')">✏️ 手入力</button>
  </div>
  <!-- スマホ: カメラ/ギャラリーボタン -->
  <div class="cam-btns" id="camBtns" style="display:none;">
    <button class="cam-btn cam" onclick="openCamera()">
      <span class="cicon">📷</span>
      <span class="clabel">カメラで撮影</span>
    </button>
    <button class="cam-btn gal" onclick="openGallery()">
      <span class="cicon">🖼️</span>
      <span class="clabel">アルバムから選択</span>
    </button>
  </div>
  <!-- PC: ドラッグ&ドロップゾーン -->
  <div class="upload-zone" id="uploadZone">
    <div class="uicon" id="uIcon">📷</div>
    <h3 id="uTitle">写真をドロップ、またはタップして選択</h3>
    <p id="uSub">領収書・注文画面のスクショをアップロード</p>
    <p style="font-size:11px;color:#555;margin-top:6px;font-family:'DM Mono',monospace;">JPG / PNG / HEIC</p>
  </div>
  <!-- ファイル入力（hidden）: カメラ用 -->
  <input type="file" id="fileCamera" accept="image/*" capture="environment" style="display:none;">
  <!-- ファイル入力（hidden）: ギャラリー用 -->
  <input type="file" id="fileGallery" accept="image/*" style="display:none;">
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="preview">
    <button class="prev-rm" onclick="clearImage()">✕</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="ai-btn buy" id="aiBtn" disabled onclick="analyze()">
    <span class="spinner" id="spinner"></span>
    <span id="aiBtnTxt">📸 AIで自動読み取り</span>
  </button>
  <div class="form-panel" id="formPanel">
    <div class="panel-header">
      <span class="panel-label" id="panelLabel">手入力フォーム</span>
      <span class="plat-badge pb-buy" id="platBadge">カードショップ 仕入れ</span>
    </div>
    <div class="fgrid" id="fieldGrid"></div>
    <button class="add-btn buy" id="addBtn" onclick="addRecord()">✓ 記録に追加</button>
  </div>
  <div class="divider"></div>
  <div class="summary-bar" id="summaryBar">
    <div class="sitem"><span class="slabel">仕入合計</span><span class="sval buy" id="sBuy">¥0</span></div>
    <div class="sitem"><span class="slabel">販売合計</span><span class="sval sell" id="sSell">¥0</span></div>
    <div class="sitem"><span class="slabel">粗利（概算）</span><span class="sval profit" id="sProfit">¥0</span></div>
  </div>
  <div class="rec-hdr">
    <span class="rec-title">記録済みデータ</span>
    <span class="rec-cnt" id="recCnt">0件</span>
  </div>
  <div class="rec-filters">
    <button class="rfil on" onclick="setFilter('all',this)">すべて</button>
    <button class="rfil" onclick="setFilter('buy',this)">🃏 仕入れ</button>
    <button class="rfil" onclick="setFilter('sell',this)">💴 販売</button>
  </div>
  <div class="rec-list" id="recList">
    <div class="empty"><div class="empty-big">📋</div>まだ記録がありません</div>
  </div>
</main>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycby_OHD59MqabF1jrhHMP5yaj2ExPsJ28nQisyRoEhslqExdtKl-PB_JKkrjzFS4T8yt/exec';
var mode='buy', method='manual', platform='カードショップ', imgBase64=null, records=[], currentFilter='all';
var syncStatus = 'idle'; // 'idle' | 'syncing' | 'error'

// ── カテゴリ ──────────────────────────────────────────────
var CATEGORIES = [
  'ポケモンカード','遊戯王','ワンピース','デュエマ','MTG',
  'ヴァンガード','ヴァイスシュヴァルツ','バトルスピリッツ','UNION ARENA','その他'
];

// ── プラットフォーム ──────────────────────────────────────
var PLATFORMS = {
  buy:  ['カードショップ','Amazon','メルカリ','ヤフオク','その他通販','直接購入'],
  sell: ['Amazon','メルカリ','ヤフオク','買取業者','カードラッシュ','トレトク','その他']
};

// ── 店名履歴（セッション内で保持） ──────────────────────
var shopHistory = [];

function addShopHistory(name) {
  name = name.trim();
  if (!name || shopHistory.indexOf(name) !== -1) return;
  shopHistory.push(name);
}
function removeShopHistory(name) {
  shopHistory = shopHistory.filter(function(s){ return s !== name; });
}

// ── フィールド定義 ────────────────────────────────────────
var FIELDS = {
  buy: [
    {key:'date',      label:'仕入日',           type:'date',   full:false, skippable:false},
    {key:'shop',      label:'仕入先・店名',       type:'shop',   full:false, skippable:true, isDefault:true},
    {key:'item',      label:'商品名（カード名）',  type:'text',   full:true,  skippable:false},
    {key:'category',  label:'カテゴリ',           type:'sel',    full:false, skippable:false},
    {key:'unit_price',label:'仕入単価（円）',      type:'number', full:false, skippable:true},
    {key:'qty',       label:'数量',               type:'number', full:false, skippable:false},
    {key:'total',     label:'仕入合計（円）',      type:'number', full:false, skippable:false},
    {key:'memo',      label:'メモ',               type:'text',   full:true,  skippable:true}
  ],
  sell: [
    {key:'date',     label:'販売日',             type:'date',   full:false, skippable:false},
    {key:'order_id', label:'注文ID / 取引ID',    type:'text',   full:false, skippable:true,  labelAlt:{'買取業者':'買取ID・伝票番号'}},
    {key:'item',     label:'商品名',              type:'text',   full:true,  skippable:false},
    {key:'category', label:'カテゴリ',            type:'sel',    full:false, skippable:false},
    {key:'price',    label:'販売価格（円）',       type:'number', full:false, skippable:false, labelAlt:{'買取業者':'買取金額（円）'}},
    {key:'fee',      label:'手数料（円）',         type:'number', full:false, skippable:true,  labelAlt:{'買取業者':'査定手数料（円）'}},
    {key:'shipping', label:'送料（円）',           type:'number', full:false, skippable:true},
    {key:'packing',  label:'梱包費（円）',         type:'number', full:false, skippable:true},
    {key:'cost',     label:'仕入原価（円）',       type:'number', full:false, skippable:true},
    {key:'memo',     label:'メモ',                type:'text',   full:true,  skippable:true}
  ]
};

// ── 初期化 ────────────────────────────────────────────────
setMode('buy');
setMethod('manual');
// 起動時にGASからデータ読込
loadFromGAS();

function setMode(m) {
  mode = m;
  var isBuy = m === 'buy';
  document.getElementById('mtBuy').className = 'mtab' + (isBuy ? ' act-buy' : '');
  document.getElementById('mtSell').className = 'mtab' + (!isBuy ? ' act-sell' : '');
  document.getElementById('aiBtn').className = 'ai-btn ' + (isBuy ? 'buy' : 'sell');
  document.documentElement.style.setProperty('--accent', isBuy ? '#f5c518' : '#00c896');

  // デフォルトプラットフォーム
  platform = isBuy ? 'カードショップ' : 'Amazon';

  var row = document.getElementById('platformRow');
  row.innerHTML = '';
  PLATFORMS[m].forEach(function(p) {
    var b = document.createElement('button');
    b.className = 'pchip' + (p === platform ? ' sel' : '');
    b.textContent = p;
    b.onclick = function() { selectPlatform(p, b); };
    row.appendChild(b);
  });

  updateUploadUI();
  hideForm();
  clearError();
  if (method === 'manual') showManualForm();
}

function selectPlatform(p, el) {
  platform = (platform === p) ? (mode === 'buy' ? 'カードショップ' : 'Amazon') : p;
  document.querySelectorAll('.pchip').forEach(function(c) { c.classList.remove('sel'); });
  // 選択中のchipをハイライト
  document.querySelectorAll('.pchip').forEach(function(c) {
    if (c.textContent === platform) c.classList.add('sel');
  });
  updateUploadUI();
  if (method === 'manual') showManualForm();
}

function setMethod(m) {
  method = m;
  document.getElementById('mPhoto').className = 'mbtn' + (m === 'photo' ? ' active' : '');
  document.getElementById('mManual').className = 'mbtn' + (m === 'manual' ? ' active' : '');
  if (m === 'photo') {
    if (isMobile) { document.getElementById('camBtns').style.display = 'flex'; document.getElementById('uploadZone').style.display = 'none'; }
    else           { document.getElementById('camBtns').style.display = 'none';  document.getElementById('uploadZone').style.display = ''; }
  } else {
    document.getElementById('camBtns').style.display = 'none';
    document.getElementById('uploadZone').style.display = 'none';
  }
  document.getElementById('previewWrap').className = 'preview-wrap';
  document.getElementById('aiBtn').style.display = m === 'photo' ? '' : 'none';
  clearError();
  if (m === 'manual') { imgBase64 = null; showManualForm(); }
  else hideForm();
}

function updateUploadUI() {
  var isBuy = mode === 'buy';
  document.getElementById('uIcon').textContent = isBuy ? '🧾' : '📱';
  document.getElementById('uTitle').textContent = isBuy
    ? '領収書・レシートをドロップ、またはタップ'
    : '注文完了画面・取引画面のスクショをドロップ';
  document.getElementById('uSub').textContent = platform
    ? platform + 'の画面をアップロード'
    : (isBuy ? '仕入れ時の領収書・レシート' : '販売プラットフォームの注文画面');
}

// ── ファイル処理 ──────────────────────────────────────────
var zone = document.getElementById('uploadZone');
var fileCamera  = document.getElementById('fileCamera');
var fileGallery = document.getElementById('fileGallery');

// スマホ判定
var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
if (isMobile) {
  document.getElementById('camBtns').style.display = 'flex';
  document.getElementById('uploadZone').style.display = 'none';
} else {
  document.getElementById('camBtns').style.display = 'none';
  document.getElementById('uploadZone').style.display = '';
}

function openCamera()  { fileCamera.value  = ''; fileCamera.click();  }
function openGallery() { fileGallery.value = ''; fileGallery.click(); }

zone.addEventListener('click', function() { fileGallery.click(); });
zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileCamera.addEventListener('change',  function(e) { handleFile(e.target.files[0]); });
fileGallery.addEventListener('change', function(e) { handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var src = ev.target.result;
    imgBase64 = src.split(',')[1];
    document.getElementById('previewImg').src = src;
    document.getElementById('previewWrap').classList.add('show');
    document.getElementById('aiBtn').disabled = false;
    hideForm(); clearError();
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  imgBase64 = null; fileCamera.value = ''; fileGallery.value = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('previewImg').src = '';
  document.getElementById('aiBtn').disabled = true;
  hideForm(); clearError();
}

// ── AI読み取り ────────────────────────────────────────────
async function analyze() {
  if (!imgBase64) return;
  clearError();
  var btn = document.getElementById('aiBtn'), sp = document.getElementById('spinner'), txt = document.getElementById('aiBtnTxt');
  btn.disabled = true; sp.style.display = 'block'; txt.textContent = 'AIが読み取り中...';
  var today = new Date().toISOString().slice(0, 10);
  var isBuy = mode === 'buy';
  var platHint = platform ? 'プラットフォーム: ' + platform : '';
  var catList = CATEGORIES.join('、');
  var sysPrompt = isBuy
    ? 'あなたはトレードカード仕入れ帳簿AIです。' + platHint + '。領収書・レシート画像から情報を抽出し、JSONのみを返してください（マークダウン不要）。\n形式: {"date":"YYYY-MM-DD","shop":"店名","item":"商品名","category":"カテゴリ","unit_price":数値,"qty":数値,"total":数値,"memo":""}\nカテゴリは次から選択: ' + catList + '\n不明は""か0。日付不明は"' + today + '"。'
    : 'あなたはトレードカード販売帳簿AIです。' + platHint + 'の注文・取引画面から情報を抽出し、JSONのみを返してください（マークダウン不要）。\n形式: {"date":"YYYY-MM-DD","order_id":"","item":"商品名","category":"カテゴリ","price":数値,"fee":数値,"shipping":数値,"packing":数値,"cost":数値,"memo":""}\nカテゴリは次から選択: ' + catList + '\n手数料: Amazon≒10-15%, メルカリ≒10%, ヤフオク≒8-10%。不明は0。日付不明は"' + today + '"。';
  try {
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system:sysPrompt,
        messages:[{role:"user", content:[
          {type:"image", source:{type:"base64", media_type:"image/jpeg", data:imgBase64}},
          {type:"text", text:"この画像から情報を抽出してJSONで返してください。"}
        ]}]})
    });
    var data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    var raw = data.content.find(function(b){return b.type==='text';}); raw = raw ? raw.text : '';
    var clean = raw.replace(/```json|```/g, '').trim();
    renderForm(JSON.parse(clean), false);
  } catch(e) {
    showError('読み取りに失敗しました。画像が不鮮明な場合は撮り直してみてください（' + e.message + '）');
  } finally {
    btn.disabled = false; sp.style.display = 'none'; txt.textContent = '📸 AIで自動読み取り';
  }
}

// ── フォーム描画 ──────────────────────────────────────────
function showManualForm() { renderForm({}, true); }
function hideForm() { document.getElementById('formPanel').classList.remove('show'); }

function renderForm(parsed, isManual) {
  var isBuy = mode === 'buy';
  document.getElementById('panelLabel').textContent = isManual
    ? '手入力フォーム — 空欄は後から修正できます'
    : '読み取り結果 — 確認・修正してから追加';
  document.getElementById('platBadge').textContent = platform + (isBuy ? ' 仕入れ' : ' 販売');
  document.getElementById('platBadge').className = 'plat-badge ' + (isBuy ? 'pb-buy' : 'pb-sell');
  document.getElementById('addBtn').className = 'add-btn ' + (isBuy ? 'buy' : 'sell');

  var grid = document.getElementById('fieldGrid');
  grid.innerHTML = '';
  var today = new Date().toISOString().slice(0, 10);

  FIELDS[mode].forEach(function(f) {
    var wrap = document.createElement('div');
    wrap.className = 'fi' + (f.full ? ' full' : '');

    // Label
    var lbl = document.createElement('label');
    lbl.textContent = (f.labelAlt && f.labelAlt[platform]) ? f.labelAlt[platform] : f.label;
    if (f.isDefault && isBuy) {
      var db = document.createElement('span');
      db.className = 'default-badge'; db.textContent = 'デフォルト';
      lbl.appendChild(db);
    }
    wrap.appendChild(lbl);

    var inner = document.createElement('div');
    inner.className = 'fi-inner';

    // ── shop型: カスタムコンボボックス ──
    if (f.type === 'shop') {
      var shopWrap = document.createElement('div');
      shopWrap.className = 'shop-wrap';

      var inp = document.createElement('input');
      inp.type = 'text'; inp.id = 'f_shop';
      inp.value = parsed['shop'] || platform || '';
      inp.placeholder = '店名を入力、または履歴から選択';
      inp.autocomplete = 'off';

      var dd = document.createElement('div');
      dd.className = 'shop-dropdown'; dd.id = 'shopDropdown';

      function refreshDropdown() {
        dd.innerHTML = '';
        var val = inp.value.trim().toLowerCase();
        var filtered = shopHistory.filter(function(s) {
          return s.toLowerCase().indexOf(val) !== -1;
        });
        // 入力値が履歴にない場合、新規追加の選択肢を表示
        if (inp.value.trim() && shopHistory.indexOf(inp.value.trim()) === -1) {
          var newOpt = document.createElement('div');
          newOpt.className = 'shop-opt';
          newOpt.innerHTML = '<span class="shop-opt-name">' + inp.value.trim() + '</span><span class="shop-new-badge">新規追加</span>';
          newOpt.onmousedown = function(e) { e.preventDefault(); inp.value = inp.value.trim(); dd.classList.remove('open'); };
          dd.appendChild(newOpt);
        }
        filtered.forEach(function(s) {
          var opt = document.createElement('div');
          opt.className = 'shop-opt';
          var nameSpan = document.createElement('span'); nameSpan.className = 'shop-opt-name'; nameSpan.textContent = s;
          var delBtn = document.createElement('button'); delBtn.className = 'shop-opt-del'; delBtn.textContent = '削除'; delBtn.type = 'button';
          delBtn.onmousedown = function(e) {
            e.preventDefault(); e.stopPropagation();
            removeShopHistory(s); refreshDropdown();
          };
          opt.onmousedown = function(e) { e.preventDefault(); inp.value = s; dd.classList.remove('open'); };
          opt.appendChild(nameSpan); opt.appendChild(delBtn);
          dd.appendChild(opt);
        });
        dd.classList.toggle('open', dd.children.length > 0);
      }

      inp.addEventListener('focus', refreshDropdown);
      inp.addEventListener('input', refreshDropdown);
      inp.addEventListener('blur', function() { setTimeout(function(){ dd.classList.remove('open'); }, 150); });

      shopWrap.appendChild(inp); shopWrap.appendChild(dd);
      inner.appendChild(shopWrap);

    // ── セレクト型 ──
    } else if (f.type === 'sel') {
      var el = document.createElement('select'); el.id = 'f_' + f.key;
      CATEGORIES.forEach(function(o) {
        var opt = document.createElement('option'); opt.value = o; opt.textContent = o;
        if (parsed[f.key] === o) opt.selected = true;
        el.appendChild(opt);
      });
      inner.appendChild(el);

    // ── 通常input ──
    } else {
      var el2 = document.createElement('input');
      el2.type = f.type; el2.id = 'f_' + f.key;
      if (f.key === 'date') el2.value = parsed[f.key] || today;
      else if (f.type === 'number') el2.value = (parsed[f.key] !== undefined && parsed[f.key] !== 0) ? parsed[f.key] : '';
      else el2.value = parsed[f.key] || '';
      el2.placeholder = f.skippable ? '不明は空欄でOK' : '';
      inner.appendChild(el2);
    }

    // スキップボタン
    if (f.skippable) {
      var skip = document.createElement('button');
      skip.className = 'skip-btn'; skip.textContent = 'スキップ'; skip.type = 'button';
      skip.onclick = function() {
        var target = document.getElementById('f_' + f.key) || document.getElementById('f_shop');
        if (target) target.value = '';
        skip.classList.toggle('skipped');
        skip.textContent = skip.classList.contains('skipped') ? '入力する' : 'スキップ';
      };
      inner.appendChild(skip);
    }

    wrap.appendChild(inner);

    // 合計の自動計算ヒント
    if (f.key === 'total') {
      var hint = document.createElement('div');
      hint.className = 'auto-hint'; hint.textContent = '単価×数量で自動計算（手動入力も可）';
      wrap.appendChild(hint);
      setTimeout(function() {
        var upEl = document.getElementById('f_unit_price');
        var qEl  = document.getElementById('f_qty');
        var tEl  = document.getElementById('f_total');
        if (upEl && qEl && tEl) {
          var calc = function() { var u=parseFloat(upEl.value)||0, q=parseFloat(qEl.value)||0; if(u&&q) tEl.value=u*q; };
          upEl.addEventListener('input', calc); qEl.addEventListener('input', calc);
        }
      }, 0);
    }

    grid.appendChild(wrap);
  });

  document.getElementById('formPanel').classList.add('show');
}

// ── 記録追加 ──────────────────────────────────────────────
function addRecord() {
  var obj = { type: mode, platform: platform || '不明' };
  FIELDS[mode].forEach(function(f) {
    var id = f.type === 'shop' ? 'f_shop' : 'f_' + f.key;
    var el = document.getElementById(id);
    if (!el) return;
    obj[f.key] = f.type === 'number' ? (parseFloat(el.value) || 0) : el.value;
  });
  if (obj.shop && obj.shop.trim()) addShopHistory(obj.shop.trim());
  // ローカルに仮IDを付与して即表示
  obj._localId = Date.now();
  records.push(obj);
  renderRecords(); hideForm(); clearImage();
  if (method === 'manual') showManualForm();
  document.getElementById('exportBtn').disabled = false;
  updateSummary();
  // GASへ非同期送信
  syncToGAS(obj);
}

function syncToGAS(record) {
  setSyncBadge('⏳ 同期中...');
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', record: record })
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if (res.ok) {
      setSyncBadge('✓ 同期済み');
      setTimeout(function(){ setSyncBadge(''); }, 3000);
    } else {
      setSyncBadge('⚠ 同期失敗');
    }
  })
  .catch(function(){
    setSyncBadge('⚠ オフライン保存');
  });
}

function setSyncBadge(text) {
  var el = document.getElementById('syncBadge');
  el.textContent = text;
  el.style.display = text ? 'inline' : 'none';
  el.style.color = text.startsWith('✓') ? '#00c896' : text.startsWith('⚠') ? '#f5c518' : '#888';
}

function loadFromGAS() {
  setSyncBadge('⏳ データ読込中...');
  fetch(GAS_URL + '?type=all')
  .then(function(r){ return r.json(); })
  .then(function(res){
    records = [];
    (res.buy || []).forEach(function(r){
      records.push({
        type:'buy', platform:r['プラットフォーム']||'', shop:r['仕入先']||'',
        item:r['商品名']||'', category:r['カテゴリ']||'',
        unit_price:r['仕入単価']||0, qty:r['数量']||0, total:r['仕入合計']||0,
        memo:r['メモ']||'', date:r['仕入日']||'',
        _gasId: r['ID']
      });
    });
    (res.sell || []).forEach(function(r){
      records.push({
        type:'sell', platform:r['プラットフォーム']||'', order_id:r['注文ID']||'',
        item:r['商品名']||'', category:r['カテゴリ']||'',
        price:r['販売価格']||0, fee:r['手数料']||0, shipping:r['送料']||0,
        packing:r['梱包費']||0, cost:r['仕入原価']||0,
        memo:r['メモ']||'', date:r['販売日']||'',
        _gasId: r['ID']
      });
    });
    renderRecords();
    updateSummary();
    if (records.length > 0) document.getElementById('exportBtn').disabled = false;
    setSyncBadge('✓ ' + records.length + '件読込完了');
    setTimeout(function(){ setSyncBadge(''); }, 3000);
  })
  .catch(function(){
    setSyncBadge('⚠ オフライン');
  });
}

function removeRecord(idx) {
  records.splice(idx, 1);
  renderRecords(); updateSummary();
  if (records.length === 0) document.getElementById('exportBtn').disabled = true;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.rfil').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on'); renderRecords();
}

function renderRecords() {
  document.getElementById('recCnt').textContent = records.length + '件';
  var list = document.getElementById('recList');
  var filtered = currentFilter === 'all' ? records : records.filter(function(r){return r.type===currentFilter;});
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-big">📋</div>' + (records.length ? 'フィルター条件に一致しません' : 'まだ記録がありません') + '</div>';
    return;
  }
  list.innerHTML = '';
  filtered.forEach(function(r) {
    var isBuy = r.type === 'buy';
    var name = r.item || '(商品名なし)';
    var amt = isBuy
      ? (r.total ? '¥' + Math.round(r.total).toLocaleString() : '-')
      : (r.price ? '¥' + Math.round(r.price).toLocaleString() : '-');
    var idx = records.indexOf(r);
    var div = document.createElement('div'); div.className = 'rec-item';
    div.innerHTML = '<div class="rtype '+(isBuy?'buy':'sell')+'">'+(isBuy?'🃏':'💴')+'</div>'
      +'<div class="rname">'+name+'</div>'
      +'<div class="rplat">'+(r.platform||'')+'</div>'
      +'<div class="ramnt '+(isBuy?'buy':'sell')+'">'+amt+'</div>'
      +'<div class="rdate">'+(r.date||'-')+'</div>'
      +'<button class="rdel" onclick="removeRecord('+idx+')">✕</button>';
    list.appendChild(div);
  });
}

function updateSummary() {
  var buyT  = records.filter(function(r){return r.type==='buy';}).reduce(function(s,r){return s+(r.total||0);},0);
  var sellT = records.filter(function(r){return r.type==='sell';}).reduce(function(s,r){return s+(r.price||0);},0);
  var profit = sellT - buyT;
  document.getElementById('sBuy').textContent  = '¥' + Math.round(buyT).toLocaleString();
  document.getElementById('sSell').textContent = '¥' + Math.round(sellT).toLocaleString();
  var pEl = document.getElementById('sProfit');
  pEl.textContent = (profit >= 0 ? '+' : '') + '¥' + Math.round(profit).toLocaleString();
  pEl.style.color = profit >= 0 ? '#a78bfa' : '#ff4d4d';
  document.getElementById('summaryBar').className = 'summary-bar' + (records.length ? ' show' : '');
}

function showError(m) { var e=document.getElementById('errorMsg'); e.textContent=m; e.style.display='block'; }
function clearError() { document.getElementById('errorMsg').style.display='none'; }

// ── Excel出力 ─────────────────────────────────────────────
function exportExcel() {
  var wb = XLSX.utils.book_new();
  var buyRecs  = records.filter(function(r){return r.type==='buy';});
  var sellRecs = records.filter(function(r){return r.type==='sell';});

  if (buyRecs.length) {
    var data = [['仕入日','プラットフォーム','仕入先','商品名','カテゴリ','仕入単価','数量','仕入合計','メモ']];
    buyRecs.forEach(function(r){ data.push([r.date,r.platform,r.shop,r.item,r.category,r.unit_price,r.qty,r.total,r.memo]); });
    var ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:12},{wch:12},{wch:16},{wch:28},{wch:16},{wch:12},{wch:8},{wch:12},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, 'トレカ仕入台帳');
  }

  if (sellRecs.length) {
    var data2 = [['販売日','プラットフォーム','注文ID','商品名','カテゴリ','販売価格','手数料','送料','梱包費','仕入原価','純利益','メモ']];
    sellRecs.forEach(function(r) {
      var p = (r.price||0)-(r.fee||0)-(r.shipping||0)-(r.packing||0)-(r.cost||0);
      data2.push([r.date,r.platform,r.order_id,r.item,r.category,r.price,r.fee,r.shipping,r.packing,r.cost,p,r.memo]);
    });
    var ws2 = XLSX.utils.aoa_to_sheet(data2);
    ws2['!cols'] = [{wch:12},{wch:12},{wch:20},{wch:26},{wch:16},{wch:12},{wch:10},{wch:8},{wch:10},{wch:12},{wch:12},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws2, '販売台帳');

    var allPlats = [];
    sellRecs.forEach(function(r){ if(allPlats.indexOf(r.platform)===-1) allPlats.push(r.platform); });
    allPlats.forEach(function(p) {
      var rows = sellRecs.filter(function(r){return r.platform===p;});
      if (!rows.length) return;
      var pd = [['販売日','注文ID','商品名','カテゴリ','販売価格','手数料','送料','梱包費','仕入原価','純利益']];
      rows.forEach(function(r){ var pr=(r.price||0)-(r.fee||0)-(r.shipping||0)-(r.packing||0)-(r.cost||0); pd.push([r.date,r.order_id,r.item,r.category,r.price,r.fee,r.shipping,r.packing,r.cost,pr]); });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pd), p.slice(0,28));
    });
  }

  var buyT  = buyRecs.reduce(function(s,r){return s+(r.total||0);},0);
  var sellT = sellRecs.reduce(function(s,r){return s+(r.price||0);},0);
  var profT = sellRecs.reduce(function(s,r){return s+((r.price||0)-(r.fee||0)-(r.shipping||0)-(r.packing||0)-(r.cost||0));},0);
  var sum = [['集計サマリー',''],['',''],['仕入合計',buyT],['販売合計',sellT],['純利益合計（概算）',profT],['仕入件数',buyRecs.length],['販売件数',sellRecs.length],['',''],['出力日時',new Date().toLocaleString('ja-JP')]];
  var sws = XLSX.utils.aoa_to_sheet(sum); sws['!cols']=[{wch:22},{wch:16}];
  XLSX.utils.book_append_sheet(wb, sws, '集計');

  var now = new Date();
  XLSX.writeFile(wb, 'トレカ収支_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.xlsx');
}
