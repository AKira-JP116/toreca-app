<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ収支DB</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --buy: #58a6ff;
  --sell: #3fb950;
  --profit: #e3b341;
  --danger: #f85149;
  --text: #e6edf3;
  --muted: #8b949e;
  --dim: #484f58;
  --r: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;letter-spacing:-0.5px;}
.logo b{color:var(--buy);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);margin-left:auto;transition:.3s;}
.dot.ok{background:var(--sell);box-shadow:0 0 6px var(--sell);}
.dot.ng{background:var(--danger);}

nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;user-select:none;}
.tab.on{color:var(--text);border-bottom-color:var(--buy);}
.tab[data-t=sell].on{border-bottom-color:var(--sell);}
.tab[data-t=cfg].on{border-bottom-color:var(--dim);}

main{max-width:860px;margin:0 auto;padding:14px;}
.pg{display:none;}.pg.on{display:block;}

/* summary */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
@media(min-width:480px){.sg{grid-template-columns:repeat(4,1fr);}}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.sl{font-size:11px;color:var(--muted);margin-bottom:3px;}
.sv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;}
.sv.b{color:var(--buy);}.sv.s{color:var(--sell);}.sv.p{color:var(--profit);}

/* form */
.fc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:16px;}
.ft{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(min-width:560px){.fg{grid-template-columns:repeat(3,1fr);}}
.fi{display:flex;flex-direction:column;gap:3px;}
.fi.full{grid-column:1/-1;}
label{font-size:11px;color:var(--muted);}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 9px;font-size:14px;font-family:'Noto Sans JP',sans-serif;width:100%;outline:none;-webkit-appearance:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--buy);}
textarea{resize:vertical;min-height:54px;}
.fa{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bb{background:var(--buy);color:#0d1117;}
.bs{background:var(--sell);color:#0d1117;}
.bg{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:7px 12px;}
.bd{background:var(--danger);color:#fff;font-size:11px;padding:4px 9px;}

/* list */
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lt{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.lc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.rl{display:flex;flex-direction:column;gap:7px;}

.rc{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--r);padding:11px 13px;display:grid;grid-template-columns:1fr auto;gap:5px;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.rc.buy{border-left-color:var(--buy);}
.rc.sell{border-left-color:var(--sell);}
.rn{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rm{font-size:11px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.rp{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;text-align:right;}
.rp.b{color:var(--buy);}.rp.s{color:var(--sell);}
.rd{font-size:11px;color:var(--muted);text-align:right;margin-top:1px;}
.ra{margin-top:5px;text-align:right;}

.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;}
.bp{background:#1f3250;color:var(--buy);}
.bs2{background:#1a3828;color:var(--sell);}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}

/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 18px;font-size:13px;z-index:999;transition:transform .25s cubic-bezier(.22,1,.36,1);white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.5);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--sell);}
#toast.ng{border-color:var(--danger);}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#0d1117;border-radius:50%;animation:sp .5s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* cfg */
.cfc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.cu{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:10px;}
pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);overflow-x:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>

<header>
  <div class="logo">トレカ<b>DB</b></div>
  <div id="dot" class="dot" title="接続状態"></div>
</header>

<nav>
  <div class="tab on" data-t="home">📊 ホーム</div>
  <div class="tab" data-t="buy">📥 仕入れ</div>
  <div class="tab" data-t="sell">📤 販売</div>
  <div class="tab" data-t="cfg">⚙️ 設定</div>
</nav>

<main>

<!-- HOME -->
<div id="pg-home" class="pg on">
  <div class="sg">
    <div class="sc"><div class="sl">総仕入額</div><div class="sv b" id="s-buy">¥—</div></div>
    <div class="sc"><div class="sl">総販売額</div><div class="sv s" id="s-sell">¥—</div></div>
    <div class="sc"><div class="sl">純利益</div><div class="sv p" id="s-profit">¥—</div></div>
    <div class="sc"><div class="sl">利益率</div><div class="sv p" id="s-margin">—%</div></div>
  </div>
  <div class="lh"><div class="lt">最近の記録</div><div class="lc" id="h-cnt">—</div></div>
  <div id="home-list" class="rl"><div class="empty">読み込み中…</div></div>
</div>

<!-- BUY -->
<div id="pg-buy" class="pg">
  <div class="fc">
    <div class="ft">📥 仕入れ登録</div>
    <div class="fg">
      <div class="fi"><label>仕入日</label><input type="date" id="b-date"></div>
      <div class="fi"><label>仕入単価 (円)</label><input type="number" id="b-price" placeholder="0"></div>
      <div class="fi"><label>数量</label><input type="number" id="b-qty" value="1" min="1"></div>
      <div class="fi full"><label>商品名</label><input type="text" id="b-name" placeholder="例：ポケモンカード リザードン ex SAR"></div>
      <div class="fi"><label>プラットフォーム</label>
        <select id="b-platform">
          <option>カードショップ</option><option>メルカリ</option><option>ヤフオク</option>
          <option>ラクマ</option><option>フリマ</option><option>開封</option><option>その他</option>
        </select>
      </div>
      <div class="fi"><label>仕入先</label><input type="text" id="b-src" placeholder="例：トレカチャンピ"></div>
      <div class="fi full"><label>メモ</label><textarea id="b-memo" placeholder="任意"></textarea></div>
    </div>
    <div class="fa">
      <button class="btn bb" id="b-btn" onclick="submitBuy()">📥 登録する</button>
      <button class="btn bg" onclick="clearBuy()">クリア</button>
    </div>
  </div>
  <div class="lh"><div class="lt">仕入れ履歴</div><div class="lc" id="buy-cnt">—件</div></div>
  <div id="buy-list" class="rl"><div class="empty">記録なし</div></div>
</div>

<!-- SELL -->
<div id="pg-sell" class="pg">
  <div class="fc">
    <div class="ft">📤 販売登録</div>
    <div class="fg">
      <div class="fi"><label>販売日</label><input type="date" id="s-date"></div>
      <div class="fi"><label>販売価格 (円)</label><input type="number" id="s-price" placeholder="0"></div>
      <div class="fi"><label>数量</label><input type="number" id="s-qty" value="1" min="1"></div>
      <div class="fi full"><label>商品名</label><input type="text" id="s-name" placeholder="例：ポケモンカード リザードン ex SAR"></div>
      <div class="fi"><label>プラットフォーム</label>
        <select id="s-platform">
          <option>メルカリ</option><option>ヤフオク</option><option>ラクマ</option>
          <option>カードショップ</option><option>その他</option>
        </select>
      </div>
      <div class="fi"><label>注文ID</label><input type="text" id="s-orderid" placeholder="任意"></div>
      <div class="fi"><label>手数料 (円)</label><input type="number" id="s-fee" placeholder="0" value="0"></div>
      <div class="fi"><label>送料 (円)</label><input type="number" id="s-ship" placeholder="0" value="0"></div>
      <div class="fi"><label>梱包費 (円)</label><input type="number" id="s-pack" placeholder="0" value="0"></div>
      <div class="fi"><label>仕入原価 (円)</label><input type="number" id="s-cost" placeholder="0" value="0"></div>
      <div class="fi full"><label>メモ</label><textarea id="s-memo" placeholder="任意"></textarea></div>
    </div>
    <div id="s-profit-preview" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--profit);margin-top:10px;min-height:20px;"></div>
    <div class="fa">
      <button class="btn bs" id="s-btn" onclick="submitSell()">📤 登録する</button>
      <button class="btn bg" onclick="clearSell()">クリア</button>
    </div>
  </div>
  <div class="lh"><div class="lt">販売履歴</div><div class="lc" id="sell-cnt">—件</div></div>
  <div id="sell-list" class="rl"><div class="empty">記録なし</div></div>
</div>

<!-- CFG -->
<div id="pg-cfg" class="pg">
  <div class="cfc">
    <div class="ft">Apps Script URL</div>
    <div class="cu">デプロイ済みのウェブアプリURLを入力してください。</div>
    <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:10px;">
    <div class="fa">
      <button class="btn bb" onclick="saveUrl()">保存 & 接続テスト</button>
      <button class="btn bg" onclick="clearUrl()">クリア</button>
    </div>
    <div id="url-msg" style="margin-top:10px;font-size:12px;color:var(--muted);"></div>
  </div>

  <div class="cfc">
    <div class="ft">Apps Script コード</div>
    <div class="cu">
      スプレッドシート →「拡張機能」→「Apps Script」に貼り付けて保存。<br>
      その後「デプロイ」→「新しいデプロイ」→ 種類：<b>ウェブアプリ</b> → アクセス：<b>全員</b>
    </div>
    <button class="btn bg" onclick="copyCode()">📋 コードをコピー</button>
    <div id="copy-msg" style="margin-top:6px;font-size:11px;color:var(--sell);"></div>
  </div>
</div>

</main>
<div id="toast"></div>

<script>
const SS_ID = '1imNBEI38cGKwg1hIm2qr1Pq4LJKVd4MlweJGmRZ0PGc';
const KEY = 'toreca_gas_url';
let GAS = 'https://script.google.com/macros/s/AKfycbyK4zQgYpn2vcdiSkUWbTKMMmzGtwAY_bpAW6xoeCAR4XcRtYUWNTTX-eUqfwwR2Md-/exec';
let BD = [], SD = [];

// ── init ──
addEventListener('DOMContentLoaded', () => {
  today('b-date'); today('s-date');
  initTabs();
  calcProfit();
  ['s-price','s-fee','s-ship','s-pack','s-cost'].forEach(id =>
    document.getElementById(id).addEventListener('input', calcProfit));
  document.getElementById('gas-url').value = GAS;
  loadAll();
});

function today(id) {
  document.getElementById(id).value = new Date().toISOString().slice(0,10);
}

function calcProfit() {
  const p = n('s-price'), fee = n('s-fee'), ship = n('s-ship'), pack = n('s-pack'), cost = n('s-cost');
  const profit = p - fee - ship - pack - cost;
  const el = document.getElementById('s-profit-preview');
  if (p > 0) {
    el.textContent = `純利益: ${profit >= 0 ? '+' : ''}¥${profit.toLocaleString('ja-JP')}`;
    el.style.color = profit >= 0 ? 'var(--sell)' : 'var(--danger)';
  } else {
    el.textContent = '';
  }
}

// ── tabs ──
function initTabs() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.pg').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('pg-' + t.dataset.t).classList.add('on');
  }));
}

// ── api ──
function setDot(s) { document.getElementById('dot').className = 'dot ' + s; }

async function api(params) {
  if (!GAS) throw new Error('URL未設定');
  const res = await fetch(GAS + '?' + new URLSearchParams(params));
  const j = await res.json();
  if (j.error) throw new Error(j.error);
  return j;
}

async function loadAll() {
  setDot('');
  try {
    const [b, s] = await Promise.all([api({action:'getBuy'}), api({action:'getSell'})]);
    BD = b.rows || []; SD = s.rows || [];
    setDot('ok'); render();
  } catch(e) { setDot('ng'); toast('読み込み失敗: ' + e.message, 'ng'); }
}

// ── render ──
function render() {
  renderBuy(); renderSell(); renderHome();
}

function renderHome() {
  const tb = BD.reduce((s,r) => s + (parseFloat(r['仕入合計'])||0), 0);
  const ts = SD.reduce((s,r) => s + (parseFloat(r['販売価格'])||0), 0);
  const tp = SD.reduce((s,r) => s + (parseFloat(r['純利益'])||0), 0);
  const mg = ts > 0 ? (tp/ts*100).toFixed(1) : '—';
  set('s-buy', '¥' + fmt(tb));
  set('s-sell', '¥' + fmt(ts));
  set('s-profit', (tp>=0?'+':'') + '¥' + fmt(tp));
  set('s-margin', mg === '—' ? '—%' : (tp>=0?'+':'') + mg + '%');

  const all = [
    ...BD.map(r => ({...r, _t:'buy', _d:r['仕入日']})),
    ...SD.map(r => ({...r, _t:'sell', _d:r['販売日']}))
  ].sort((a,b) => b['登録日時'] > a['登録日時'] ? 1 : -1).slice(0,12);

  set('h-cnt', (BD.length+SD.length) + '件');
  document.getElementById('home-list').innerHTML = all.length
    ? all.map(r => cardHtml(r)).join('')
    : '<div class="empty">記録がありません</div>';
}

function renderBuy() {
  set('buy-cnt', BD.length + '件');
  document.getElementById('buy-list').innerHTML = BD.length
    ? [...BD].reverse().map(r => cardHtml({...r, _t:'buy'})).join('')
    : '<div class="empty">仕入れ記録なし</div>';
}

function renderSell() {
  set('sell-cnt', SD.length + '件');
  document.getElementById('sell-list').innerHTML = SD.length
    ? [...SD].reverse().map(r => cardHtml({...r, _t:'sell'})).join('')
    : '<div class="empty">販売記録なし</div>';
}

function cardHtml(r) {
  const isBuy = r._t === 'buy';
  const price = isBuy ? r['仕入合計'] : r['販売価格'];
  const sub   = isBuy ? r['仕入先']   : r['プラットフォーム'];
  const date  = isBuy ? r['仕入日']   : r['販売日'];
  const profit = !isBuy && r['純利益'] !== undefined
    ? `<span style="color:${parseFloat(r['純利益'])>=0?'var(--sell)':'var(--danger)'}">${parseFloat(r['純利益'])>=0?'+':''}¥${fmt(r['純利益'])}</span>` : '';
  return `<div class="rc ${isBuy?'buy':'sell'}">
    <div>
      <div class="rn">${esc(r['商品名']||'—')}</div>
      <div class="rm">
        <span class="badge ${isBuy?'bp':'bs2'}">${isBuy?'仕入':'販売'}</span>
        ${esc(sub||'')}
        ${r['数量']>1?`<span>×${r['数量']}</span>`:''}
        ${profit}
      </div>
    </div>
    <div>
      <div class="rp ${isBuy?'b':'s'}">¥${fmt(price)}</div>
      <div class="rd">${fmtD(date)}</div>
      <div class="ra"><button class="btn bd" onclick="del('${r._t}','${r._row}')">削除</button></div>
    </div>
  </div>`;
}

// ── submit ──
async function submitBuy() {
  const name = document.getElementById('b-name').value.trim();
  const price = n('b-price'), qty = n('b-qty') || 1;
  const date = document.getElementById('b-date').value;
  if (!name || !price || !date) { toast('商品名・日付・仕入単価は必須', 'ng'); return; }
  const now = new Date().toLocaleString('ja-JP');
  const data = {
    date, name, price, qty,
    total: price * qty,
    platform: document.getElementById('b-platform').value,
    src: document.getElementById('b-src').value,
    memo: document.getElementById('b-memo').value,
    now
  };
  setBusy('b-btn', true);
  try {
    await api({action:'addBuy', data: JSON.stringify(data)});
    toast('仕入れを登録しました ✓', 'ok');
    clearBuy();
    await loadAll();
  } catch(e) { toast('失敗: ' + e.message, 'ng'); }
  setBusy('b-btn', false, '📥 登録する');
}

async function submitSell() {
  const name = document.getElementById('s-name').value.trim();
  const price = n('s-price');
  const date = document.getElementById('s-date').value;
  if (!name || !price || !date) { toast('商品名・日付・販売価格は必須', 'ng'); return; }
  const fee = n('s-fee'), ship = n('s-ship'), pack = n('s-pack'), cost = n('s-cost');
  const qty = n('s-qty') || 1;
  const now = new Date().toLocaleString('ja-JP');
  const data = {
    date, name, price, qty,
    platform: document.getElementById('s-platform').value,
    orderid: document.getElementById('s-orderid').value,
    fee, ship, pack, cost,
    profit: price - fee - ship - pack - cost,
    memo: document.getElementById('s-memo').value,
    now
  };
  setBusy('s-btn', true);
  try {
    await api({action:'addSell', data: JSON.stringify(data)});
    toast('販売を登録しました ✓', 'ok');
    clearSell();
    await loadAll();
  } catch(e) { toast('失敗: ' + e.message, 'ng'); }
  setBusy('s-btn', false, '📤 登録する');
}

async function del(type, row) {
  if (!confirm('削除しますか？')) return;
  try {
    await api({action:'deleteRow', sheet: type==='buy'?'仕入台帳':'販売台帳', row});
    toast('削除しました', 'ok');
    await loadAll();
  } catch(e) { toast('削除失敗: ' + e.message, 'ng'); }
}

// ── settings ──
async function saveUrl() {
  GAS = document.getElementById('gas-url').value.trim();
  if (!GAS) { toast('URLを入力してください', 'ng'); return; }
  localStorage.setItem(KEY, GAS);
  set('url-msg', '接続テスト中…');
  try {
    await loadAll();
    set('url-msg', '✅ 接続成功！');
  } catch(e) {
    set('url-msg', '❌ 失敗: ' + e.message);
  }
}

function clearUrl() {
  GAS = ''; localStorage.removeItem(KEY);
  document.getElementById('gas-url').value = '';
  set('url-msg', ''); setDot('');
}

function copyCode() {
  const code = `// トレカ収支DB - Apps Script
const SS_ID = '${SS_ID}';
const S_BUY  = '仕入台帳';
const S_SELL = '販売台帳';

function doGet(e)  { return handle(e); }
function doPost(e) { return handle(e); }

function handle(e) {
  const p = e.parameter;
  let r;
  try {
    switch(p.action) {
      case 'addBuy':    r = addBuy(JSON.parse(p.data));  break;
      case 'addSell':   r = addSell(JSON.parse(p.data)); break;
      case 'getBuy':    r = getRows(S_BUY);              break;
      case 'getSell':   r = getRows(S_SELL);             break;
      case 'deleteRow': r = delRow(p.sheet, +p.row);     break;
      default: r = {error:'unknown'};
    }
  } catch(ex) { r = {error: ex.toString()}; }
  return ContentService.createTextOutput(JSON.stringify(r))
    .setMimeType(ContentService.MimeType.JSON);
}

function addBuy(d) {
  const ss = SpreadsheetApp.openById(SS_ID);
  const sh = ss.getSheetByName(S_BUY);
  const id = Date.now().toString();
  sh.appendRow([id, d.date, d.platform, d.src, d.name, d.price, d.qty, d.total, d.memo, d.now]);
  return {ok:true, id};
}

function addSell(d) {
  const ss = SpreadsheetApp.openById(SS_ID);
  const sh = ss.getSheetByName(S_SELL);
  const id = Date.now().toString();
  sh.appendRow([id, d.date, d.platform, d.orderid, d.name, d.price, d.qty, d.fee, d.ship, d.pack, d.cost, d.profit, d.memo, d.now]);
  return {ok:true, id};
}

function getRows(sheetName) {
  const sh = SpreadsheetApp.openById(SS_ID).getSheetByName(sheetName);
  if (!sh) return {rows:[]};
  const vals = sh.getDataRange().getValues();
  const hdr  = vals[0];
  const rows = vals.slice(1).map((r,i) => {
    const obj = {_row: i+2};
    hdr.forEach((h,j) => obj[h] = r[j]);
    return obj;
  });
  return {rows};
}

function delRow(sheetName, row) {
  SpreadsheetApp.openById(SS_ID).getSheetByName(sheetName).deleteRow(row);
  return {ok:true};
}`;
  navigator.clipboard.writeText(code).then(() => {
    set('copy-msg', '✅ コピーしました！Apps Scriptに貼り付けてください。');
    setTimeout(() => set('copy-msg',''), 4000);
  });
}

// ── helpers ──
function n(id) { return parseFloat(document.getElementById(id).value) || 0; }
function set(id, v) { const e=document.getElementById(id); if(e) e.textContent = v; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(v) { const x=parseFloat(v); return isNaN(x)?'0':Math.round(x).toLocaleString('ja-JP'); }
function fmtD(d) { return d ? String(d).slice(0,10).replace(/-/g,'/') : ''; }
function setBusy(id, busy, label) {
  const el = document.getElementById(id);
  el.disabled = busy;
  el.innerHTML = busy ? '<span class="spin"></span> 送信中…' : label;
}

function clearBuy() {
  ['b-name','b-src','b-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('b-price').value = '';
  document.getElementById('b-qty').value = 1;
  today('b-date');
}
function clearSell() {
  ['s-name','s-orderid','s-memo'].forEach(id => document.getElementById(id).value = '');
  ['s-price','s-fee','s-ship','s-pack','s-cost'].forEach(id => document.getElementById(id).value = 0);
  document.getElementById('s-qty').value = 1;
  today('s-date'); calcProfit();
}

let tt;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'');
  clearTimeout(tt);
  tt = setTimeout(() => el.className='', 3000);
}
